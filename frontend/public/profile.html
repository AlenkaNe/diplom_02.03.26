<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .auth-section {
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
        }

        .auth-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #7f8c8d;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #3498db;
            border-bottom-color: #3498db;
            font-weight: 600;
        }

        .auth-tab:hover {
            color: #3498db;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #2980b9;
        }

        .submit-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .user-info {
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .user-info h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
        }

        .info-label {
            font-size: 12px;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #3498db;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="healthy-nutrition.html">Про здоровое питание</a></li>
                <li><a href="weight-loss.html">ПП для похудения</a></li>
                <li><a href="calorie-calculator.html">Калькулятор калорий</a></li>
                <li><a href="product-search.html">Поиск продуктов</a></li>
                <li><a href="diary.html">Дневник питания</a></li>
                <li><a href="profile.html" class="active">Профиль</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container profile-container">
            <h1>Профиль</h1>

            <div id="auth-section" class="auth-section">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>

                <div id="message" class="message" style="display: none;"></div>

                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label for="login-username">Логин:</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Пароль:</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="submit-btn">Войти</button>
                </form>

                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="register-username">Логин:</label>
                        <input type="text" id="register-username" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Пароль:</label>
                        <input type="password" id="register-password" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="register-first-name">Имя:</label>
                            <input type="text" id="register-first-name">
                        </div>
                        <div class="form-group">
                            <label for="register-last-name">Фамилия:</label>
                            <input type="text" id="register-last-name">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="register-gender">Пол:</label>
                            <select id="register-gender">
                                <option value="">Не указан</option>
                                <option value="male">Мужской</option>
                                <option value="female">Женский</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="register-age">Возраст:</label>
                            <input type="number" id="register-age" min="1" max="120">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="register-height">Рост (см):</label>
                        <input type="number" id="register-height" min="50" max="250">
                    </div>
                    <div class="form-group">
                        <label for="register-weight">Вес (кг):</label>
                        <input type="number" step="0.1" min="20" max="500" id="register-weight" placeholder="например, 68.5">
                    </div>
                    <button type="submit" class="submit-btn">Зарегистрироваться</button>
                </form>
            </div>

            <div id="user-section" class="user-info" style="display: none;">
                <h2>Информация о пользователе</h2>
                <div id="user-content"></div>
                <button id="edit-btn" class="submit-btn" style="margin-top: 10px;">Редактировать данные</button>
                <form id="edit-form" class="auth-form" style="margin-top: 15px; display: none;">
                    <div class="form-group">
                        <label for="edit-login">Логин:</label>
                        <input type="text" id="edit-login" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-first-name">Имя:</label>
                            <input type="text" id="edit-first-name">
                        </div>
                        <div class="form-group">
                            <label for="edit-last-name">Фамилия:</label>
                            <input type="text" id="edit-last-name">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-gender">Пол:</label>
                            <select id="edit-gender">
                                <option value="">Не указан</option>
                                <option value="male">Мужской</option>
                                <option value="female">Женский</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-age">Возраст:</label>
                            <input type="number" id="edit-age" min="1" max="120">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-height">Рост (см):</label>
                            <input type="number" id="edit-height" min="50" max="250">
                        </div>
                        <div class="form-group">
                            <label for="edit-weight">Вес (кг):</label>
                            <input type="number" step="0.1" min="20" max="500" id="edit-weight" placeholder="например, 68.5">
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Сохранить изменения</button>
                </form>
                <button id="logout-btn" class="logout-btn">Выйти</button>
            </div>

            <div id="loading" class="loading" style="display: none;">Загрузка...</div>
        </div>
    </main>

    <footer>
        <p>Твой план ПП.</p>
    </footer>

    <script src="profile.js"></script>
</body>
</html>
